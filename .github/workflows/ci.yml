name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q
      - name: Smoke-test the pipeline (national demo)
        run: python scripts/run_texas_pilot.py --demo

  web:
    name: Web app build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build
